<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512" role="img" aria-label="Ulyah English">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b3b2e"/>
      <stop offset="1" stop-color="#06251b"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f4d992"/>
      <stop offset="0.5" stop-color="#d4af4a"/>
      <stop offset="1" stop-color="#b8912f"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <!-- thin gold frame -->
  <rect x="40" y="40" width="432" height="432" rx="84" fill="none" stroke="url(#gold)" stroke-width="3" opacity="0.55"/>
  <!-- Rub el Hizb — two overlaid squares forming an 8-point star -->
  <g transform="translate(256 256)" fill="none" stroke="url(#gold)" stroke-width="10" stroke-linejoin="round">
    <rect x="-118" y="-118" width="236" height="236" transform="rotate(0)"/>
    <rect x="-118" y="-118" width="236" height="236" transform="rotate(45)"/>
  </g>
  <!-- inner khatam ring + center -->
  <circle cx="256" cy="256" r="70" fill="none" stroke="url(#gold)" stroke-width="6" opacity="0.9"/>
  <g transform="translate(256 256)" fill="url(#gold)">
    <circle r="12"/>
    <g stroke="url(#gold)" stroke-width="4">
      <line x1="0" y1="-70" x2="0" y2="-96"/>
      <line x1="0" y1="70" x2="0" y2="96"/>
      <line x1="-70" y1="0" x2="-96" y2="0"/>
      <line x1="70" y1="0" x2="96" y2="0"/>
    </g>
  </g>
</svg>
