name: Generate Audiobooks (manual, no API key)

# Synthesises downloadable MP3 audiobooks for published articles that have no
# audio yet, using fully-offline open-source TTS — NO API key of any kind.
#   • Piper (neural voices) where a model exists for the language
#   • eSpeak-NG universal fallback (covers every language incl. id & ar)
# Idempotent: re-running only fills the gaps.

on:
  workflow_dispatch:
    inputs:
      lang:
        description: "Language filter (id | en | ar | ... or blank for all)"
        required: false
        default: ""
      limit:
        description: "Max articles to process this run"
        required: true
        default: "40"
  # Zero-hand: without this, "audio being processed" never stops being true —
  # the workflow only existed as a manual trigger nobody ever pressed, so
  # every published story sat with no audio indefinitely. Hourly (rather than
  # daily) keeps audio production much closer in step with the every-minute
  # content-generation cron (wrangler.toml) — this job just can't run at that
  # same cadence: each run spends real wall-clock minutes installing
  # espeak-ng/ffmpeg and downloading Piper voice models before it even starts
  # synthesising, and GitHub Actions itself discourages/throttles schedules
  # finer than a few minutes on shared runners. Hourly is the practical floor
  # for a job with this much per-run setup cost.
  schedule:
    - cron: "0 * * * *"

# Hourly runs are frequent enough that a slow run could still be going when
# the next one fires; queue (never cancel a run already writing audio) rather
# than let two runs race the same articles.
concurrency:
  group: generate-audiobooks
  cancel-in-progress: false

jobs:
  audiobooks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile

      - name: Install offline TTS engines (espeak-ng, ffmpeg, piper)
        run: |
          set -eu
          sudo apt-get update
          sudo apt-get install -y espeak-ng ffmpeg
          # Piper (neural TTS) — best-effort; espeak-ng covers everything if this fails.
          PIPER_VER="2023.11.14-2"
          curl -sfL "https://github.com/rhasspy/piper/releases/download/${PIPER_VER}/piper_linux_x86_64.tar.gz" -o /tmp/piper.tgz || true
          if [ -f /tmp/piper.tgz ]; then
            tar -xzf /tmp/piper.tgz -C "$HOME" || true
            echo "$HOME/piper" >> "$GITHUB_PATH"
            echo "PIPER_BIN=$HOME/piper/piper" >> "$GITHUB_ENV"
          fi

      - name: Download Piper voice models (best-effort, per language)
        run: |
          set -u
          mkdir -p voices
          base="https://huggingface.co/rhasspy/piper-voices/resolve/main"
          fetch () { # path name
            curl -sfL "$base/$1/$2.onnx" -o "voices/$2.onnx" && \
            curl -sfL "$base/$1/$2.onnx.json" -o "voices/$2.onnx.json" || \
            echo "  (skip $2 — will use espeak-ng for this language)"
          }
          fetch en/en_US/lessac/medium   en_US-lessac-medium
          fetch ar/ar_JO/kareem/medium   ar_JO-kareem-medium
          fetch ru/ru_RU/dmitri/medium   ru_RU-dmitri-medium
          fetch de/de_DE/thorsten/medium de_DE-thorsten-medium
          fetch fr/fr_FR/siwis/medium    fr_FR-siwis-medium
          fetch zh/zh_CN/huayan/medium   zh_CN-huayan-medium
          ls -la voices || true

      - name: Resolve provisioned resource IDs
        run: |
          set -eu
          CF="https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}"
          AUTH="Authorization: Bearer ${CLOUDFLARE_API_TOKEN}"
          D1_ID=$(curl -sf -H "$AUTH" "$CF/d1/database?name=ulyah-db&per_page=100" | jq -r '.result[] | select(.name=="ulyah-db") | .uuid' | head -n1)
          KV_ID=$(curl -sf -H "$AUTH" "$CF/storage/kv/namespaces?per_page=100" | jq -r '.result[] | select(.title=="ulyah-cache") | .id' | head -n1)
          sed -i "s/__D1_DATABASE_ID__/${D1_ID}/" apps/worker-api/wrangler.toml
          sed -i "s/__KV_NAMESPACE_ID__/${KV_ID}/" apps/worker-api/wrangler.toml
          sed -i "s/__R2_BUCKET_NAME__/ulyah-media/" apps/worker-api/wrangler.toml
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Generate audiobooks
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          R2_BUCKET_NAME: ulyah-media
          PIPER_VOICES_DIR: ${{ github.workspace }}/voices
        run: npx tsx scripts/generate-audiobooks.ts --lang=${{ inputs.lang || '' }} --limit=${{ inputs.limit || '40' }}
