name: i18n Consistency Patrol

# The scheduled "penjelajah": every day it walks all UI-string sources across
# the ecosystem and checks that no sibling site is left in the wrong language
# (missing inline-locale copy, a dictionary key gap, or unbalanced kisah
# content). Clean = standby. When it finds something it opens a tracking issue
# so a fix (human- or AI-authored) can land as a normal reviewed PR.
#
# The *content* half of the owner's "worker AI" — new other-language content
# arriving in D1 — is handled automatically by the companion workflow
# `translate-content.yml` (pre-translates new kitab into fr/de/es on a
# schedule) plus the deterministic cover-art generator (a unique cover is
# derived from every slug with no extra step). This workflow is the audit half.

on:
  schedule:
    - cron: "0 3 * * *" # daily, 03:00 UTC
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  patrol:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile

      - name: Run consistency audit
        id: audit
        run: |
          set +e
          npx tsx scripts/audit-i18n-consistency.ts --json > audit.json
          echo "exit=$?" >> "$GITHUB_OUTPUT"
          node -e "const a=require('./audit.json');console.log('findings:',a.findings.length)"

      - name: Open a tracking issue on findings
        if: steps.audit.outputs.exit != '0'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const a = JSON.parse(fs.readFileSync('audit.json', 'utf8'));
            const lines = a.findings.map(f => `- **${f.kind}** — \`${f.file}\`\n  ${f.detail}`).join('\n');
            const body = [
              'The daily i18n consistency patrol found copy that would render in the wrong language on a sibling site.',
              '',
              lines,
              '',
              '_Auto-filed by `.github/workflows/i18n-consistency-patrol.yml`. Fix by adding the missing locale copy / dictionary keys, then let CI re-audit._',
              '',
              '---',
              '_Generated by [Claude Code](https://claude.ai/code)_',
            ].join('\n');
            const title = `i18n consistency: ${a.findings.length} finding(s) need translation`;
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner, repo: context.repo.repo,
              state: 'open', labels: 'i18n-consistency',
            });
            if (existing.data.length) {
              await github.rest.issues.update({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: existing.data[0].number, title, body,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner, repo: context.repo.repo,
                title, body, labels: ['i18n-consistency'],
              });
            }
