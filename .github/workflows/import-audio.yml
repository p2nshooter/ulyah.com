name: Import Murottal Audio (manual)

# Populates R2 + audio_cache with real qori recitation from EveryAyah.com
# (licensed for non-commercial redistribution, arsitektur doc §10.1).
# Manual-only: this moves a lot of data and should be run deliberately, not
# on every push. Trigger from the Actions tab, pick a qori + surah range.

on:
  workflow_dispatch:
    inputs:
      qori:
        description: "Qori key from scripts/import-murottal-audio.ts (alafasy | sudais | ghamdi | husary | abdulbasit-murattal | abdulbasit-mujawwad | minshawi | tablawi | jibreel | hudhaify | muaiqly | ajmy | shatri | rifai | qatami | dosari | akhdar | sowaid | qasim | bukhatir | abbad | mansoori)"
        required: true
        default: "alafasy"
      surah_range:
        description: "Surah range, e.g. 1-114 or just 1"
        required: true
        default: "1-114"

jobs:
  import:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Resolve provisioned resource IDs (same self-provisioned names as deploy.yml)
        run: |
          set -eu
          CF="https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}"
          AUTH="Authorization: Bearer ${CLOUDFLARE_API_TOKEN}"
          D1_ID=$(curl -sf -H "$AUTH" "$CF/d1/database?name=ulyah-db&per_page=100" | jq -r '.result[] | select(.name=="ulyah-db") | .uuid' | head -n1)
          KV_ID=$(curl -sf -H "$AUTH" "$CF/storage/kv/namespaces?per_page=100" | jq -r '.result[] | select(.title=="ulyah-cache") | .id' | head -n1)
          sed -i "s/__D1_DATABASE_ID__/${D1_ID}/" apps/worker-api/wrangler.toml
          sed -i "s/__KV_NAMESPACE_ID__/${KV_ID}/" apps/worker-api/wrangler.toml
          sed -i "s/__R2_BUCKET_NAME__/ulyah-media/" apps/worker-api/wrangler.toml
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Import audio
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          R2_BUCKET_NAME: ulyah-media
        run: npx tsx scripts/import-murottal-audio.ts --qori=${{ inputs.qori }} --surah=${{ inputs.surah_range }}
