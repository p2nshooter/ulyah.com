name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  build-and-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck worker-api
        run: pnpm --filter @ulyah/worker-api typecheck

      - name: Typecheck web
        run: pnpm --filter @ulyah/web typecheck

      - name: Build web (Next.js)
        run: pnpm --filter @ulyah/web build
        env:
          NEXT_PUBLIC_API_URL: https://api.ulyah.com
