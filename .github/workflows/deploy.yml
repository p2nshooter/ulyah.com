name: Deploy to Cloudflare

# Full auto pipeline: push to main -> self-provision D1/KV/R2 if missing ->
# migrate D1 -> seed (idempotent) -> upload seed PDFs to R2 -> push Worker
# secrets -> deploy worker-api -> build & deploy the Next.js web app ->
# smoke test.
#
# Only two Cloudflare secrets are required (CLOUDFLARE_API_TOKEN,
# CLOUDFLARE_ACCOUNT_ID) — the D1 database, KV namespace, and R2 bucket are
# created automatically on first run if they don't already exist, so there's
# no manual "go create these resources first" step. Everything else (PayPal,
# NOWPayments, admin bootstrap credentials) comes from GitHub Secrets — see
# docs/SETUP.md for the exact expected names. Nothing sensitive is ever
# committed to the repo.

on:
  push:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: deploy-production
  cancel-in-progress: false

env:
  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
  CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Verify required secrets are present
        run: |
          set -eu
          missing=""
          for name in CLOUDFLARE_API_TOKEN CLOUDFLARE_ACCOUNT_ID ADMIN_BOOTSTRAP_EMAIL ADMIN_BOOTSTRAP_PASSWORD; do
            if [ -z "${!name:-}" ]; then missing="$missing $name"; fi
          done
          if [ -n "$missing" ]; then
            echo "::error::Missing required GitHub Secrets:$missing — see docs/SETUP.md"
            exit 1
          fi
        env:
          ADMIN_BOOTSTRAP_EMAIL: ${{ secrets.ADMIN_BOOTSTRAP_EMAIL }}
          ADMIN_BOOTSTRAP_PASSWORD: ${{ secrets.ADMIN_BOOTSTRAP_PASSWORD }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: |
          pnpm --filter @ulyah/worker-api typecheck
          pnpm --filter @ulyah/web typecheck

      - name: Self-provision D1 / KV / R2 if missing (Cloudflare REST API)
        id: provision
        env:
          # Optional overrides so a Workers-scoped token can still deploy: if
          # the token can't LIST D1/KV (needs D1:Read / KV:Read), set these repo
          # Variables to the known ids and provisioning uses them directly.
          # ulyah-db uuid is 28800662-2034-456d-a91d-a6532c2a9abd.
          VAR_D1_ID: ${{ vars.CLOUDFLARE_D1_DATABASE_ID }}
          VAR_KV_ID: ${{ vars.CLOUDFLARE_KV_NAMESPACE_ID }}
        run: |
          set -eu
          CF="https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}"
          AUTH="Authorization: Bearer ${CLOUDFLARE_API_TOKEN}"
          JSON="Content-Type: application/json"

          # Verify the token up front and show which permissions it actually
          # carries — turns a cryptic "Failed to resolve id" into a clear
          # "your token is missing D1:Edit" the moment you read the log.
          echo "--- Token verification ---"
          VERIFY=$(curl -s -H "$AUTH" "https://api.cloudflare.com/client/v4/user/tokens/verify" || true)
          echo "$VERIFY" | jq -r '"status=\(.result.status // "unknown") success=\(.success)"' 2>/dev/null || echo "verify parse failed"
          if [ "$(echo "$VERIFY" | jq -r '.success' 2>/dev/null)" != "true" ]; then
            echo "::warning::Token verify did not return success — the API token may be invalid or expired."
          fi

          # Helper: on a failed list/create, print Cloudflare's real error text.
          show_err() { echo "$1" | jq -r '.errors[]? | "  CF error \(.code): \(.message)"' 2>/dev/null || true; }

          echo "--- D1 database 'ulyah-db' ---"
          D1_RESP=$(curl -s -H "$AUTH" "$CF/d1/database?name=ulyah-db&per_page=100" || true)
          D1_ID=$(echo "$D1_RESP" | jq -r '.result[]? | select(.name=="ulyah-db") | .uuid' 2>/dev/null | head -n1 || true)
          if [ -z "$D1_ID" ] && [ -n "${VAR_D1_ID:-}" ]; then
            echo "List returned nothing; using repo Variable CLOUDFLARE_D1_DATABASE_ID."
            D1_ID="$VAR_D1_ID"
          fi
          if [ -z "$D1_ID" ]; then
            show_err "$D1_RESP"
            echo "Creating D1 database ulyah-db..."
            D1_CREATE=$(curl -s -X POST -H "$AUTH" -H "$JSON" -d '{"name":"ulyah-db"}' "$CF/d1/database" || true)
            D1_ID=$(echo "$D1_CREATE" | jq -r '.result.uuid // empty' 2>/dev/null || true)
            [ -z "$D1_ID" ] && show_err "$D1_CREATE"
          fi
          if [ -z "$D1_ID" ] || [ "$D1_ID" = "null" ]; then
            echo "::error::Cannot resolve the D1 database id. The CLOUDFLARE_API_TOKEN can deploy Workers but cannot read/create D1 — add the 'Account > D1 : Edit' permission to the token (the 'Edit Cloudflare Workers' template already includes it), or set the repo Variable CLOUDFLARE_D1_DATABASE_ID=28800662-2034-456d-a91d-a6532c2a9abd."
            exit 1
          fi
          echo "D1 database id: $D1_ID"
          echo "CLOUDFLARE_D1_DATABASE_ID=$D1_ID" >> "$GITHUB_ENV"

          echo "--- KV namespace 'ulyah-cache' ---"
          KV_RESP=$(curl -s -H "$AUTH" "$CF/storage/kv/namespaces?per_page=100" || true)
          KV_ID=$(echo "$KV_RESP" | jq -r '.result[]? | select(.title=="ulyah-cache") | .id' 2>/dev/null | head -n1 || true)
          if [ -z "$KV_ID" ] && [ -n "${VAR_KV_ID:-}" ]; then
            echo "List returned nothing; using repo Variable CLOUDFLARE_KV_NAMESPACE_ID."
            KV_ID="$VAR_KV_ID"
          fi
          if [ -z "$KV_ID" ]; then
            show_err "$KV_RESP"
            echo "Creating KV namespace ulyah-cache..."
            KV_CREATE=$(curl -s -X POST -H "$AUTH" -H "$JSON" -d '{"title":"ulyah-cache"}' "$CF/storage/kv/namespaces" || true)
            KV_ID=$(echo "$KV_CREATE" | jq -r '.result.id // empty' 2>/dev/null || true)
            [ -z "$KV_ID" ] && show_err "$KV_CREATE"
          fi
          if [ -z "$KV_ID" ] || [ "$KV_ID" = "null" ]; then
            echo "::error::Cannot resolve the KV namespace id — add 'Account > Workers KV Storage : Edit' to the token, or set repo Variable CLOUDFLARE_KV_NAMESPACE_ID."
            exit 1
          fi
          echo "KV namespace id: $KV_ID"
          echo "CLOUDFLARE_KV_NAMESPACE_ID=$KV_ID" >> "$GITHUB_ENV"

          echo "--- R2 bucket 'ulyah-media' ---"
          R2_RESP=$(curl -s -H "$AUTH" "$CF/r2/buckets?per_page=100" || true)
          R2_EXISTS=$(echo "$R2_RESP" | jq -r '.result.buckets[]? | select(.name=="ulyah-media") | .name' 2>/dev/null | head -n1 || true)
          if [ -z "$R2_EXISTS" ]; then
            echo "Creating R2 bucket ulyah-media (non-fatal if the token lacks R2)..."
            curl -s -X POST -H "$AUTH" -H "$JSON" -d '{"name":"ulyah-media"}' "$CF/r2/buckets" | jq -r '.success' || true
          fi
          echo "CLOUDFLARE_R2_BUCKET_NAME=ulyah-media" >> "$GITHUB_ENV"

      - name: Substitute wrangler.toml resource IDs
        run: |
          set -eu
          sed -i "s/__D1_DATABASE_ID__/${CLOUDFLARE_D1_DATABASE_ID}/" apps/worker-api/wrangler.toml
          sed -i "s/__KV_NAMESPACE_ID__/${CLOUDFLARE_KV_NAMESPACE_ID}/" apps/worker-api/wrangler.toml
          sed -i "s/__R2_BUCKET_NAME__/${CLOUDFLARE_R2_BUCKET_NAME}/" apps/worker-api/wrangler.toml

      - name: Apply D1 migrations (schema + language-independent seed)
        working-directory: apps/worker-api
        run: npx wrangler d1 migrations apply ulyah-db --remote

      - name: Ingest AI keys from secret into the pool (secure, idempotent)
        working-directory: apps/worker-api
        env:
          AI_KEY_BULK_IMPORT: ${{ secrets.AI_KEY_BULK_IMPORT }}
          KEY_ENCRYPTION_SECRET: ${{ secrets.KEY_ENCRYPTION_SECRET }}
        run: |
          set -eu
          # Only does anything when the owner has set the AI_KEY_BULK_IMPORT
          # GitHub Secret (a blob of NVIDIA/OpenRouter keys). Keys are AES-256
          # encrypted here with KEY_ENCRYPTION_SECRET (same as the worker) and
          # inserted as 'active'; a SHA-256 fingerprint makes re-runs a no-op.
          # Nothing is ever written to the repo.
          if [ -z "${AI_KEY_BULK_IMPORT:-}" ]; then
            echo "AI_KEY_BULK_IMPORT not set — skipping key ingest."
            exit 0
          fi
          EXISTING_FP=$(npx wrangler d1 execute ulyah-db --remote --command="SELECT key_fingerprint FROM ai_key_pool WHERE key_fingerprint IS NOT NULL;" --json 2>/dev/null | node -e "let s='';process.stdin.on('data',d=>s+=d).on('end',()=>{try{const j=JSON.parse(s);console.log(j[0].results.map(r=>r.key_fingerprint).join(','))}catch(e){console.log('')}})" || echo "")
          EXISTING_FP="$EXISTING_FP" node ../../scripts/ingest-bulk-keys.mjs > /tmp/keys.sql 2>/tmp/keys.err || true
          cat /tmp/keys.err || true
          if [ -s /tmp/keys.sql ]; then
            echo "Applying $(grep -c 'INSERT INTO ai_key_pool' /tmp/keys.sql) new key(s) to the pool."
            npx wrangler d1 execute ulyah-db --remote --file=/tmp/keys.sql
          else
            echo "No new keys to ingest."
          fi
          rm -f /tmp/keys.sql /tmp/keys.err

      - name: Seed Qur'an text + translations + curated content (idempotent)
        working-directory: apps/worker-api
        run: |
          set -eu
          npx wrangler d1 execute ulyah-db --remote --command="SELECT COUNT(*) AS n FROM surah;" --json > /tmp/surah_count.json
          COUNT=$(node -e "const j=require('/tmp/surah_count.json'); console.log(j[0].results[0].n)")
          if [ "$COUNT" = "0" ]; then
            echo "Empty database detected — applying full seed set."
            npx wrangler d1 execute ulyah-db --remote --file=../../packages/db-schema/seed/quran_seed.sql
            for lang in en ru de fr zh es bn sv tr ur; do
              npx wrangler d1 execute ulyah-db --remote --file=../../packages/db-schema/seed/quran_seed_${lang}.sql
            done
            npx wrangler d1 execute ulyah-db --remote --file=../../packages/db-schema/seed/curated_content.sql
            npx wrangler d1 execute ulyah-db --remote --file=../../packages/db-schema/seed/kisah_yusuf.sql
          else
            echo "Database already has $COUNT surah rows — skipping bulk seed."
          fi

      - name: Import German Qur'an translation (one-time, idempotent)
        continue-on-error: true
        working-directory: apps/worker-api
        run: |
          set -eu
          # tilawa.de must show a native GERMAN ayah translation, never the
          # English fallback (owner: bahasa induk domain). quran_seed_de.sql
          # is generated by scripts/generate-quran-de-seed.ts from the
          # fawazahmed0/quran-api dataset (Abu Rida via Tanzil). The
          # already-provisioned production DB never re-runs the empty-DB
          # branch above, so German needs its own gated import.
          DECOUNT=$(npx wrangler d1 execute ulyah-db --remote --command="SELECT COUNT(*) AS n FROM translation WHERE lang='de';" --json 2>/dev/null | node -e "let s='';process.stdin.on('data',d=>s+=d).on('end',()=>{try{const j=JSON.parse(s);console.log(j[0].results[0].n)}catch(e){console.log(0)}})" || echo 0)
          if [ "$DECOUNT" -lt "6236" ]; then
            echo "German translation has $DECOUNT rows — importing quran_seed_de.sql."
            npx wrangler d1 execute ulyah-db --remote --file=../../packages/db-schema/seed/quran_seed_de.sql
          else
            echo "German translation already complete ($DECOUNT rows) — skipping."
          fi

      - name: Apply idempotent content seeds (always — INSERT OR IGNORE, small)
        working-directory: apps/worker-api
        run: |
          set -eu
          # Safe to re-run on every deploy: these use INSERT OR IGNORE, so they
          # only add new curated content and never duplicate. The AI-free engine
          # then compiles each row into narratable articles.
          npx wrangler d1 execute ulyah-db --remote --file=../../packages/db-schema/seed/hadith_shahih.sql

      - name: Bulk-import the Sunnah's nine books + Arba'in/Qudsi (one-time)
        continue-on-error: true
        working-directory: apps/worker-api
        run: |
          set -eu
          # fawazahmed0/hadith-api (Unlicense/public domain) — full Arabic +
          # Indonesian + English text for Bukhari, Muslim, Tirmidzi, Abu
          # Dawud, An-Nasa'i, Ibnu Majah and Muwatta Malik, plus Arba'in
          # An-Nawawi and Hadits Qudsi (Arabic + English; Indonesian is
          # translated on demand in the reader). Each collection's id range is
          # checked independently so this is idempotent and a collection added
          # later only backfills what's missing. The `hadith_number`/`collection`
          # threshold uses a low bar (nawawi has only 42 hadith, qudsi ~40).
          for col in bukhari:1001:100 muslim:9001:100 tirmidhi:20001:100 abudawud:30001:100 nasai:40001:100 ibnmajah:50001:100 malik:60001:100 nawawi:70001:10 qudsi:75001:10 dehlawi:80001:10; do
            name="${col%%:*}"; rest="${col#*:}"; startid="${rest%%:*}"; minrows="${rest##*:}"
            npx wrangler d1 execute ulyah-db --remote --command="SELECT COUNT(*) AS n FROM hadits WHERE id >= ${startid} AND id < ${startid}+9999;" --json > /tmp/hadits_${name}_count.json
            HCOUNT=$(node -e "const j=require('/tmp/hadits_${name}_count.json'); console.log(j[0].results[0].n)")
            if [ "$HCOUNT" -lt "$minrows" ]; then
              echo "$name has only $HCOUNT rows — importing."
              npx wrangler d1 execute ulyah-db --remote --file=../../packages/db-schema/seed/hadith_${name}.sql
              # Drop the cached collections list so a newly-added book (e.g.
              # dehlawi) appears on /hadits immediately, not after its 24h TTL.
              npx wrangler kv key delete "hadits:collections" --binding=CACHE_KV --remote || true
            else
              echo "$name already has $HCOUNT rows — skipping."
            fi
          done

      - name: Bulk-import Musnad Ahmad + Sunan ad-Darimi (one-time, idempotent)
        continue-on-error: true
        working-directory: apps/worker-api
        run: |
          set -eu
          # gadingnst/hadith-api (MIT) — Arabic + native Indonesian, matched by
          # hadith number. Two collections not covered by fawazahmed0 above.
          # Catalog rows are self-contained INSERT OR IGNORE, safe to re-run.
          npx wrangler d1 execute ulyah-db --remote --file=../../packages/db-schema/seed/hadith_ahmad_darimi_catalog.sql
          for col in ahmad:80001:100 darimi:90001:100; do
            name="${col%%:*}"; rest="${col#*:}"; startid="${rest%%:*}"; minrows="${rest##*:}"
            npx wrangler d1 execute ulyah-db --remote --command="SELECT COUNT(*) AS n FROM hadits WHERE id >= ${startid} AND id < ${startid}+9999;" --json > /tmp/hadits_${name}_count.json
            HCOUNT=$(node -e "const j=require('/tmp/hadits_${name}_count.json'); console.log(j[0].results[0].n)")
            if [ "$HCOUNT" -lt "$minrows" ]; then
              echo "$name has only $HCOUNT rows — importing."
              npx wrangler d1 execute ulyah-db --remote --file=../../packages/db-schema/seed/hadith_${name}.sql
              # Drop the cached collections list so the new book appears on
              # /hadits immediately instead of waiting out its 24h TTL.
              npx wrangler kv key delete "hadits:collections" --binding=CACHE_KV --remote || true
            else
              echo "$name already has $HCOUNT rows — skipping."
            fi
          done

      - name: Import Riyadhus Shalihin (one-time, idempotent)
        continue-on-error: true
        working-directory: apps/worker-api
        run: |
          set -eu
          # irsyadulibad/hadits-database (carihadis.com) — Riyadhus Shalihin
          # Imam An-Nawawi, 371 hadith, Arabic + Indonesian, HTML-cleaned. ids 100001+.
          RCOUNT=$(npx wrangler d1 execute ulyah-db --remote --command="SELECT COUNT(*) AS n FROM hadits WHERE collection='riyadhus';" --json 2>/dev/null | node -e "let s='';process.stdin.on('data',d=>s+=d).on('end',()=>{try{const j=JSON.parse(s);console.log(j[0].results[0].n)}catch(e){console.log(0)}})" || echo 0)
          if [ "$RCOUNT" -lt "350" ]; then
            echo "Riyadhus Shalihin has $RCOUNT rows — importing."
            npx wrangler d1 execute ulyah-db --remote --file=../../packages/db-schema/seed/hadith_riyadhus.sql
            npx wrangler kv key delete "hadits:collections" --binding=CACHE_KV --remote || true
          else
            echo "Riyadhus Shalihin already has $RCOUNT rows — skipping."
          fi

      - name: Import Kisah Nabi Musa AS series (one-time, idempotent)
        continue-on-error: true
        working-directory: apps/worker-api
        run: |
          set -eu
          # kisah_yusuf.sql only ever runs inside the "empty database" branch
          # above, which the already-provisioned production DB never hits
          # again — this series needs its own idempotency check instead.
          npx wrangler d1 execute ulyah-db --remote --command="SELECT COUNT(*) AS n FROM stories WHERE series_key = 'kisah-nabi-musa';" --json > /tmp/kisah_musa_count.json
          MCOUNT=$(node -e "const j=require('/tmp/kisah_musa_count.json'); console.log(j[0].results[0].n)")
          if [ "$MCOUNT" -lt "1" ]; then
            echo "Kisah Nabi Musa not yet seeded — importing."
            npx wrangler d1 execute ulyah-db --remote --file=../../packages/db-schema/seed/kisah_musa.sql
          else
            echo "Kisah Nabi Musa already has $MCOUNT rows — skipping."
          fi

      - name: Import Kisah Dzulqarnain series (one-time, idempotent)
        continue-on-error: true
        working-directory: apps/worker-api
        run: |
          set -eu
          npx wrangler d1 execute ulyah-db --remote --command="SELECT COUNT(*) AS n FROM stories WHERE series_key = 'kisah-dzulqarnain';" --json > /tmp/kisah_dzul_count.json
          DCOUNT=$(node -e "const j=require('/tmp/kisah_dzul_count.json'); console.log(j[0].results[0].n)")
          if [ "$DCOUNT" -lt "1" ]; then
            echo "Kisah Dzulqarnain not yet seeded — importing."
            npx wrangler d1 execute ulyah-db --remote --file=../../packages/db-schema/seed/kisah_dzulqarnain.sql
          else
            echo "Kisah Dzulqarnain already has $DCOUNT rows — skipping."
          fi

      - name: Import Kisah Ashabul Kahfi series (one-time, idempotent)
        continue-on-error: true
        working-directory: apps/worker-api
        run: |
          set -eu
          npx wrangler d1 execute ulyah-db --remote --command="SELECT COUNT(*) AS n FROM stories WHERE series_key = 'kisah-ashabul-kahfi';" --json > /tmp/kisah_kahfi_count.json
          KAHFICOUNT=$(node -e "const j=require('/tmp/kisah_kahfi_count.json'); console.log(j[0].results[0].n)")
          if [ "$KAHFICOUNT" -lt "1" ]; then
            echo "Kisah Ashabul Kahfi not yet seeded — importing."
            npx wrangler d1 execute ulyah-db --remote --file=../../packages/db-schema/seed/kisah_ashabul_kahfi.sql
          else
            echo "Kisah Ashabul Kahfi already has $KAHFICOUNT rows — skipping."
          fi

      - name: Import Kisah Nabi Nuh AS series (one-time, idempotent)
        continue-on-error: true
        working-directory: apps/worker-api
        run: |
          set -eu
          npx wrangler d1 execute ulyah-db --remote --command="SELECT COUNT(*) AS n FROM stories WHERE series_key = 'kisah-nuh';" --json > /tmp/kisah_nuh_count.json
          NUHCOUNT=$(node -e "const j=require('/tmp/kisah_nuh_count.json'); console.log(j[0].results[0].n)")
          if [ "$NUHCOUNT" -lt "1" ]; then
            echo "Kisah Nabi Nuh not yet seeded — importing."
            npx wrangler d1 execute ulyah-db --remote --file=../../packages/db-schema/seed/kisah_nuh.sql
          else
            echo "Kisah Nabi Nuh already has $NUHCOUNT rows — skipping."
          fi

      - name: Import Kisah Maryam & Nabi Isa AS series (one-time, idempotent)
        continue-on-error: true
        working-directory: apps/worker-api
        run: |
          set -eu
          npx wrangler d1 execute ulyah-db --remote --command="SELECT COUNT(*) AS n FROM stories WHERE series_key = 'kisah-maryam';" --json > /tmp/kisah_maryam_count.json
          MARCOUNT=$(node -e "const j=require('/tmp/kisah_maryam_count.json'); console.log(j[0].results[0].n)")
          if [ "$MARCOUNT" -lt "1" ]; then
            echo "Kisah Maryam not yet seeded — importing."
            npx wrangler d1 execute ulyah-db --remote --file=../../packages/db-schema/seed/kisah_maryam.sql
          else
            echo "Kisah Maryam already has $MARCOUNT rows — skipping."
          fi

      - name: Import Kisah Nabi Sulaiman AS & Ratu Saba' series (one-time, idempotent)
        continue-on-error: true
        working-directory: apps/worker-api
        run: |
          set -eu
          npx wrangler d1 execute ulyah-db --remote --command="SELECT COUNT(*) AS n FROM stories WHERE series_key = 'kisah-sulaiman';" --json > /tmp/kisah_sulaiman_count.json
          SULCOUNT=$(node -e "const j=require('/tmp/kisah_sulaiman_count.json'); console.log(j[0].results[0].n)")
          if [ "$SULCOUNT" -lt "1" ]; then
            echo "Kisah Sulaiman not yet seeded — importing."
            npx wrangler d1 execute ulyah-db --remote --file=../../packages/db-schema/seed/kisah_sulaiman.sql
          else
            echo "Kisah Sulaiman already has $SULCOUNT rows — skipping."
          fi

      - name: Import Kisah Nabi Ibrahim AS series (one-time, idempotent)
        continue-on-error: true
        working-directory: apps/worker-api
        run: |
          set -eu
          npx wrangler d1 execute ulyah-db --remote --command="SELECT COUNT(*) AS n FROM stories WHERE series_key = 'kisah-ibrahim';" --json > /tmp/kisah_ibrahim_count.json
          IBRCOUNT=$(node -e "const j=require('/tmp/kisah_ibrahim_count.json'); console.log(j[0].results[0].n)")
          if [ "$IBRCOUNT" -lt "1" ]; then
            echo "Kisah Ibrahim not yet seeded — importing."
            npx wrangler d1 execute ulyah-db --remote --file=../../packages/db-schema/seed/kisah_ibrahim.sql
          else
            echo "Kisah Ibrahim already has $IBRCOUNT rows — skipping."
          fi

      - name: Import Kisah Nabi Adam AS series (one-time, idempotent)
        continue-on-error: true
        working-directory: apps/worker-api
        run: |
          set -eu
          npx wrangler d1 execute ulyah-db --remote --command="SELECT COUNT(*) AS n FROM stories WHERE series_key = 'kisah-adam';" --json > /tmp/kisah_adam_count.json
          ADMCOUNT=$(node -e "const j=require('/tmp/kisah_adam_count.json'); console.log(j[0].results[0].n)")
          # 11 episodes x 2 languages = 22. Seed is INSERT OR IGNORE, so re-applying
          # while under-count tops up newly-added episodes without duplicating.
          if [ "$ADMCOUNT" -lt "22" ]; then
            echo "Kisah Adam has $ADMCOUNT/22 rows — importing (idempotent)."
            npx wrangler d1 execute ulyah-db --remote --file=../../packages/db-schema/seed/kisah_adam.sql
          else
            echo "Kisah Adam already has $ADMCOUNT rows — skipping."
          fi

      - name: Import Kisah Nabi Idris AS series (idempotent)
        continue-on-error: true
        working-directory: apps/worker-api
        run: |
          set -eu
          npx wrangler d1 execute ulyah-db --remote --command="SELECT COUNT(*) AS n FROM stories WHERE series_key = 'kisah-idris';" --json > /tmp/kisah_idris_count.json
          IDRCOUNT=$(node -e "const j=require('/tmp/kisah_idris_count.json'); console.log(j[0].results[0].n)")
          # 2 episodes x 2 languages = 4. INSERT OR IGNORE → safe to re-apply.
          if [ "$IDRCOUNT" -lt "4" ]; then
