name: Deploy to Cloudflare

# Full auto pipeline: push to main -> self-provision D1/KV/R2 if missing ->
# migrate D1 -> seed (idempotent) -> upload seed PDFs to R2 -> push Worker
# secrets -> deploy worker-api -> build & deploy the Next.js web app ->
# smoke test.
#
# Only two Cloudflare secrets are required (CLOUDFLARE_API_TOKEN,
# CLOUDFLARE_ACCOUNT_ID) — the D1 database, KV namespace, and R2 bucket are
# created automatically on first run if they don't already exist, so there's
# no manual "go create these resources first" step. Everything else (PayPal,
# NOWPayments, admin bootstrap credentials) comes from GitHub Secrets — see
# docs/SETUP.md for the exact expected names. Nothing sensitive is ever
# committed to the repo.

on:
  push:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: deploy-production
  cancel-in-progress: false

env:
  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
  CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Verify required secrets are present
        run: |
          set -eu
          missing=""
          for name in CLOUDFLARE_API_TOKEN CLOUDFLARE_ACCOUNT_ID ADMIN_BOOTSTRAP_EMAIL ADMIN_BOOTSTRAP_PASSWORD; do
            if [ -z "${!name:-}" ]; then missing="$missing $name"; fi
          done
          if [ -n "$missing" ]; then
            echo "::error::Missing required GitHub Secrets:$missing — see docs/SETUP.md"
            exit 1
          fi
        env:
          ADMIN_BOOTSTRAP_EMAIL: ${{ secrets.ADMIN_BOOTSTRAP_EMAIL }}
          ADMIN_BOOTSTRAP_PASSWORD: ${{ secrets.ADMIN_BOOTSTRAP_PASSWORD }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: |
          pnpm --filter @ulyah/worker-api typecheck
          pnpm --filter @ulyah/web typecheck

      - name: Self-provision D1 / KV / R2 if missing (Cloudflare REST API)
        id: provision
        run: |
          set -eu
          CF="https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}"
          AUTH="Authorization: Bearer ${CLOUDFLARE_API_TOKEN}"
          JSON="Content-Type: application/json"

          echo "--- D1 database 'ulyah-db' ---"
          D1_ID=$(curl -sf -H "$AUTH" "$CF/d1/database?name=ulyah-db&per_page=100" \
            | jq -r '.result[] | select(.name=="ulyah-db") | .uuid' | head -n1)
          if [ -z "$D1_ID" ]; then
            echo "Creating D1 database ulyah-db..."
            D1_ID=$(curl -sf -X POST -H "$AUTH" -H "$JSON" -d '{"name":"ulyah-db"}' "$CF/d1/database" | jq -r '.result.uuid')
          fi
          [ -n "$D1_ID" ] && [ "$D1_ID" != "null" ] || { echo "::error::Failed to resolve D1 database id — check token has Account>D1:Edit"; exit 1; }
          echo "D1 database id: $D1_ID"
          echo "CLOUDFLARE_D1_DATABASE_ID=$D1_ID" >> "$GITHUB_ENV"

          echo "--- KV namespace 'ulyah-cache' ---"
          KV_ID=$(curl -sf -H "$AUTH" "$CF/storage/kv/namespaces?per_page=100" \
            | jq -r '.result[] | select(.title=="ulyah-cache") | .id' | head -n1)
          if [ -z "$KV_ID" ]; then
            echo "Creating KV namespace ulyah-cache..."
            KV_ID=$(curl -sf -X POST -H "$AUTH" -H "$JSON" -d '{"title":"ulyah-cache"}' "$CF/storage/kv/namespaces" | jq -r '.result.id')
          fi
          [ -n "$KV_ID" ] && [ "$KV_ID" != "null" ] || { echo "::error::Failed to resolve KV namespace id — check token has Account>Workers KV Storage:Edit"; exit 1; }
          echo "KV namespace id: $KV_ID"
          echo "CLOUDFLARE_KV_NAMESPACE_ID=$KV_ID" >> "$GITHUB_ENV"

          echo "--- R2 bucket 'ulyah-media' ---"
          R2_EXISTS=$(curl -sf -H "$AUTH" "$CF/r2/buckets?per_page=100" \
            | jq -r '.result.buckets[]? | select(.name=="ulyah-media") | .name' | head -n1)
          if [ -z "$R2_EXISTS" ]; then
            echo "Creating R2 bucket ulyah-media..."
            curl -sf -X POST -H "$AUTH" -H "$JSON" -d '{"name":"ulyah-media"}' "$CF/r2/buckets" | jq -r '.success'
          fi
          echo "CLOUDFLARE_R2_BUCKET_NAME=ulyah-media" >> "$GITHUB_ENV"

      - name: Substitute wrangler.toml resource IDs
        run: |
          set -eu
          sed -i "s/__D1_DATABASE_ID__/${CLOUDFLARE_D1_DATABASE_ID}/" apps/worker-api/wrangler.toml
          sed -i "s/__KV_NAMESPACE_ID__/${CLOUDFLARE_KV_NAMESPACE_ID}/" apps/worker-api/wrangler.toml
          sed -i "s/__R2_BUCKET_NAME__/${CLOUDFLARE_R2_BUCKET_NAME}/" apps/worker-api/wrangler.toml

      - name: Apply D1 migrations (schema + language-independent seed)
        working-directory: apps/worker-api
        run: npx wrangler d1 migrations apply ulyah-db --remote

      - name: Seed Qur'an text + translations + curated content (idempotent)
        working-directory: apps/worker-api
        run: |
          set -eu
          npx wrangler d1 execute ulyah-db --remote --command="SELECT COUNT(*) AS n FROM surah;" --json > /tmp/surah_count.json
          COUNT=$(node -e "const j=require('/tmp/surah_count.json'); console.log(j[0].results[0].n)")
          if [ "$COUNT" = "0" ]; then
            echo "Empty database detected — applying full seed set."
            npx wrangler d1 execute ulyah-db --remote --file=../../packages/db-schema/seed/quran_seed.sql
            for lang in en ru fr zh es bn sv tr ur; do
              npx wrangler d1 execute ulyah-db --remote --file=../../packages/db-schema/seed/quran_seed_${lang}.sql
            done
            npx wrangler d1 execute ulyah-db --remote --file=../../packages/db-schema/seed/curated_content.sql
            npx wrangler d1 execute ulyah-db --remote --file=../../packages/db-schema/seed/kisah_yusuf.sql
          else
            echo "Database already has $COUNT surah rows — skipping bulk seed."
          fi

      - name: Apply idempotent content seeds (always — INSERT OR IGNORE, small)
        working-directory: apps/worker-api
        run: |
          set -eu
          # Safe to re-run on every deploy: these use INSERT OR IGNORE, so they
          # only add new curated content and never duplicate. The AI-free engine
          # then compiles each row into narratable articles.
          npx wrangler d1 execute ulyah-db --remote --file=../../packages/db-schema/seed/hadith_shahih.sql

      - name: Bulk-import the Sunnah's nine books + Arba'in/Qudsi (one-time)
        working-directory: apps/worker-api
        run: |
          set -eu
          # fawazahmed0/hadith-api (Unlicense/public domain) — full Arabic +
          # Indonesian + English text for Bukhari, Muslim, Tirmidzi, Abu
          # Dawud, An-Nasa'i, Ibnu Majah and Muwatta Malik, plus Arba'in
          # An-Nawawi and Hadits Qudsi (Arabic + English; Indonesian is
          # translated on demand in the reader). Each collection's id range is
          # checked independently so this is idempotent and a collection added
          # later only backfills what's missing. The `hadith_number`/`collection`
          # threshold uses a low bar (nawawi has only 42 hadith, qudsi ~40).
          for col in bukhari:1001:100 muslim:9001:100 tirmidhi:20001:100 abudawud:30001:100 nasai:40001:100 ibnmajah:50001:100 malik:60001:100 nawawi:70001:10 qudsi:75001:10; do
            name="${col%%:*}"; rest="${col#*:}"; startid="${rest%%:*}"; minrows="${rest##*:}"
            npx wrangler d1 execute ulyah-db --remote --command="SELECT COUNT(*) AS n FROM hadits WHERE id >= ${startid} AND id < ${startid}+9999;" --json > /tmp/hadits_${name}_count.json
            HCOUNT=$(node -e "const j=require('/tmp/hadits_${name}_count.json'); console.log(j[0].results[0].n)")
            if [ "$HCOUNT" -lt "$minrows" ]; then
              echo "$name has only $HCOUNT rows — importing."
              npx wrangler d1 execute ulyah-db --remote --file=../../packages/db-schema/seed/hadith_${name}.sql
            else
              echo "$name already has $HCOUNT rows — skipping."
            fi
          done

      - name: Bulk-import Musnad Ahmad + Sunan ad-Darimi (one-time, idempotent)
        working-directory: apps/worker-api
        run: |
          set -eu
          # gadingnst/hadith-api (MIT) — Arabic + native Indonesian, matched by
          # hadith number. Two collections not covered by fawazahmed0 above.
          # Catalog rows are self-contained INSERT OR IGNORE, safe to re-run.
          npx wrangler d1 execute ulyah-db --remote --file=../../packages/db-schema/seed/hadith_ahmad_darimi_catalog.sql
          for col in ahmad:80001:100 darimi:90001:100; do
            name="${col%%:*}"; rest="${col#*:}"; startid="${rest%%:*}"; minrows="${rest##*:}"
            npx wrangler d1 execute ulyah-db --remote --command="SELECT COUNT(*) AS n FROM hadits WHERE id >= ${startid} AND id < ${startid}+9999;" --json > /tmp/hadits_${name}_count.json
            HCOUNT=$(node -e "const j=require('/tmp/hadits_${name}_count.json'); console.log(j[0].results[0].n)")
            if [ "$HCOUNT" -lt "$minrows" ]; then
              echo "$name has only $HCOUNT rows — importing."
              npx wrangler d1 execute ulyah-db --remote --file=../../packages/db-schema/seed/hadith_${name}.sql
              # Drop the cached collections list so the new book appears on
              # /hadits immediately instead of waiting out its 24h TTL.
              npx wrangler kv key delete "hadits:collections" --binding=CACHE_KV --remote || true
            else
              echo "$name already has $HCOUNT rows — skipping."
            fi
          done

      - name: Import Kisah Nabi Musa AS series (one-time, idempotent)
        working-directory: apps/worker-api
        run: |
          set -eu
          # kisah_yusuf.sql only ever runs inside the "empty database" branch
          # above, which the already-provisioned production DB never hits
          # again — this series needs its own idempotency check instead.
          npx wrangler d1 execute ulyah-db --remote --command="SELECT COUNT(*) AS n FROM stories WHERE series_key = 'kisah-nabi-musa';" --json > /tmp/kisah_musa_count.json
          MCOUNT=$(node -e "const j=require('/tmp/kisah_musa_count.json'); console.log(j[0].results[0].n)")
          if [ "$MCOUNT" -lt "1" ]; then
            echo "Kisah Nabi Musa not yet seeded — importing."
            npx wrangler d1 execute ulyah-db --remote --file=../../packages/db-schema/seed/kisah_musa.sql
          else
            echo "Kisah Nabi Musa already has $MCOUNT rows — skipping."
          fi

      - name: Import Kisah Dzulqarnain series (one-time, idempotent)
        working-directory: apps/worker-api
        run: |
          set -eu
          npx wrangler d1 execute ulyah-db --remote --command="SELECT COUNT(*) AS n FROM stories WHERE series_key = 'kisah-dzulqarnain';" --json > /tmp/kisah_dzul_count.json
          DCOUNT=$(node -e "const j=require('/tmp/kisah_dzul_count.json'); console.log(j[0].results[0].n)")
          if [ "$DCOUNT" -lt "1" ]; then
            echo "Kisah Dzulqarnain not yet seeded — importing."
            npx wrangler d1 execute ulyah-db --remote --file=../../packages/db-schema/seed/kisah_dzulqarnain.sql
          else
            echo "Kisah Dzulqarnain already has $DCOUNT rows — skipping."
          fi

      - name: Import Kisah Ashabul Kahfi series (one-time, idempotent)
        working-directory: apps/worker-api
        run: |
          set -eu
          npx wrangler d1 execute ulyah-db --remote --command="SELECT COUNT(*) AS n FROM stories WHERE series_key = 'kisah-ashabul-kahfi';" --json > /tmp/kisah_kahfi_count.json
          KAHFICOUNT=$(node -e "const j=require('/tmp/kisah_kahfi_count.json'); console.log(j[0].results[0].n)")
          if [ "$KAHFICOUNT" -lt "1" ]; then
            echo "Kisah Ashabul Kahfi not yet seeded — importing."
            npx wrangler d1 execute ulyah-db --remote --file=../../packages/db-schema/seed/kisah_ashabul_kahfi.sql
          else
            echo "Kisah Ashabul Kahfi already has $KAHFICOUNT rows — skipping."
          fi

      - name: Import Kisah Nabi Nuh AS series (one-time, idempotent)
        working-directory: apps/worker-api
        run: |
          set -eu
          npx wrangler d1 execute ulyah-db --remote --command="SELECT COUNT(*) AS n FROM stories WHERE series_key = 'kisah-nuh';" --json > /tmp/kisah_nuh_count.json
          NUHCOUNT=$(node -e "const j=require('/tmp/kisah_nuh_count.json'); console.log(j[0].results[0].n)")
          if [ "$NUHCOUNT" -lt "1" ]; then
            echo "Kisah Nabi Nuh not yet seeded — importing."
            npx wrangler d1 execute ulyah-db --remote --file=../../packages/db-schema/seed/kisah_nuh.sql
          else
            echo "Kisah Nabi Nuh already has $NUHCOUNT rows — skipping."
          fi

      - name: Bulk-import Kitab library catalogue (one-time, ~4.9k works)
        working-directory: apps/worker-api
        run: |
          set -eu
          # Shamela-Library dataset — classical Islamic works grouped by the
          # traditional sciences (catalogue + description + topics only). ~5k
          # INSERT OR IGNORE statements: only run once, skip once present.
          npx wrangler d1 execute ulyah-db --remote --command="SELECT COUNT(*) AS n FROM kitab_book;" --json > /tmp/kitab_count.json
          KCOUNT=$(node -e "const j=require('/tmp/kitab_count.json'); console.log(j[0].results[0].n)")
          if [ "$KCOUNT" -lt "1000" ]; then
            echo "Kitab library has only $KCOUNT works — importing full Shamela catalogue."
            npx wrangler d1 execute ulyah-db --remote --file=../../packages/db-schema/seed/kitab_library.sql
          else
            echo "Kitab library already has $KCOUNT works — skipping bulk import."
          fi

      - name: Import Kitab Pesantren readable library (one-time, idempotent)
        working-directory: apps/worker-api
        run: |
          set -eu
          # Curated readable matn (Safinah, Ta'lim Muta'allim, Jurumiyah, …):
          # category → kitab → bab → matan (Arab + terjemah + penjelasan).
          # Small + INSERT OR IGNORE, so re-running is a no-op; gated on the
          # pesantren_kitab count so it only does real work the first time.
          KPCOUNT=$(npx wrangler d1 execute ulyah-db --remote --command="SELECT COUNT(*) AS n FROM pesantren_kitab;" --json 2>/dev/null | node -e "let s='';process.stdin.on('data',d=>s+=d).on('end',()=>{try{const j=JSON.parse(s);console.log(j[0].results[0].n)}catch(e){console.log(0)}})" || echo 0)
          if [ "$KPCOUNT" -lt "13" ]; then
            echo "Kitab Pesantren has $KPCOUNT kitab — importing readable library."
            npx wrangler d1 execute ulyah-db --remote --file=../../packages/db-schema/seed/pesantren_kitab.sql
          else
            echo "Kitab Pesantren already has $KPCOUNT kitab — skipping import."
          fi

      - name: Import Amalan Harian (doa/dzikir/thibb, one-time, idempotent)
        working-directory: apps/worker-api
        run: |
          set -eu
          # Curated daily amalan (doa bangun→tidur, dzikir, thibbun nabawi,
          # fitrah). Small + INSERT OR IGNORE, gated on the item count so it
          # only does real work the first time and re-runs are no-ops.
          ACOUNT=$(npx wrangler d1 execute ulyah-db --remote --command="SELECT COUNT(*) AS n FROM amalan_item;" --json 2>/dev/null | node -e "let s='';process.stdin.on('data',d=>s+=d).on('end',()=>{try{const j=JSON.parse(s);console.log(j[0].results[0].n)}catch(e){console.log(0)}})" || echo 0)
          if [ "$ACOUNT" -lt "35" ]; then
            echo "Amalan Harian has $ACOUNT items — importing."
            npx wrangler d1 execute ulyah-db --remote --file=../../packages/db-schema/seed/amalan_harian.sql
          else
            echo "Amalan Harian already has $ACOUNT items — skipping import."
          fi

      - name: Import Nasakh & Mansukh (one-time, idempotent)
        working-directory: apps/worker-api
        run: |
          set -eu
          NCOUNT=$(npx wrangler d1 execute ulyah-db --remote --command="SELECT COUNT(*) AS n FROM nasakh_mansukh;" --json 2>/dev/null | node -e "let s='';process.stdin.on('data',d=>s+=d).on('end',()=>{try{const j=JSON.parse(s);console.log(j[0].results[0].n)}catch(e){console.log(0)}})" || echo 0)
          if [ "$NCOUNT" -lt "11" ]; then
            echo "Nasakh-Mansukh has $NCOUNT entries — importing."
            npx wrangler d1 execute ulyah-db --remote --file=../../packages/db-schema/seed/nasakh_mansukh.sql
          else
            echo "Nasakh-Mansukh already has $NCOUNT entries — skipping import."
          fi

      - name: Clean up obsolete murottal R2 cache (one-time)
        working-directory: apps/worker-api
        run: |
          set -eu
          # Murottal audio is no longer re-hosted in R2 — the frontend streams
          # it directly from the reciter's own public CDN instead (cheaper,
          # instant, no import job). Same reasoning applies to tafsir/asbabun
          # nuzul: fetched live from GitHub + cached in KV, not bulk-imported
          # into D1 (a full bulk import kept hitting D1's per-statement size
          # limit for content a stable public source already serves). This
          # just clears the now-unused audio_cache rows once.
          DONE=$(npx wrangler kv key get "cleanup:murottal-r2-done" --binding=CACHE_KV --remote 2>/dev/null || echo "")
          if [ -z "$DONE" ]; then
            echo "Clearing obsolete audio_cache rows."
            npx wrangler d1 execute ulyah-db --remote --command="DELETE FROM audio_cache;"
            npx wrangler kv key put "cleanup:murottal-r2-done" "1" --binding=CACHE_KV --remote
          else
            echo "Murottal R2 cleanup already done — skipping."
          fi

      - name: Regenerate hadits sessions with Arabic text (one-time backfill)
        working-directory: apps/worker-api
        run: |
          set -eu
          # Earlier compiled hadits-sesi stories were built before the item
          # template included the Arabic wording — wipe them + reset the
          # compile cursor so the next scheduled compile tick (every 15 min)
          # regenerates every session from scratch with Arabic included.
          # Purely additive/reproducible: these are all auto-generated from
          # the vetted `hadits` table, nothing hand-authored is lost.
          DONE=$(npx wrangler kv key get "compile:hadits:arabic-backfill-done" --binding=CACHE_KV --remote 2>/dev/null || echo "")
          if [ -z "$DONE" ]; then
            echo "Wiping compiled hadits sessions for Arabic-text backfill."
            npx wrangler d1 execute ulyah-db --remote --command="DELETE FROM stories WHERE series_key = 'hadits-sesi';"
            npx wrangler kv key delete "compile:hadits:cursor:id" --binding=CACHE_KV --remote || true
            npx wrangler kv key delete "compile:hadits:cursor:en" --binding=CACHE_KV --remote || true
            npx wrangler kv key put "compile:hadits:arabic-backfill-done" "1" --binding=CACHE_KV --remote
          else
            echo "Hadits Arabic-text backfill already done — skipping."
          fi

      - name: Upload seed PDFs (Kisah Nabi Yusuf) to R2
        working-directory: apps/worker-api
        run: |
          set -eu
          find ../../packages/db-schema/seed/assets/kisah-nabi-yusuf -name "*.pdf" | while read -r f; do
            key="ebooks/kisah-nabi-yusuf/$(echo "$f" | sed 's#.*/kisah-nabi-yusuf/##')"
            npx wrangler r2 object put "${CLOUDFLARE_R2_BUCKET_NAME}/${key}" --file="$f" --remote --content-type=application/pdf
          done

      - name: Upload seed PDFs (Kisah Nabi Musa) to R2
        working-directory: apps/worker-api
        run: |
          set -eu
          find ../../packages/db-schema/seed/assets/kisah-nabi-musa -name "*.pdf" | while read -r f; do
            key="ebooks/kisah-nabi-musa/$(echo "$f" | sed 's#.*/kisah-nabi-musa/##')"
            npx wrangler r2 object put "${CLOUDFLARE_R2_BUCKET_NAME}/${key}" --file="$f" --remote --content-type=application/pdf
          done

      - name: Upload seed PDFs (Kisah Dzulqarnain) to R2
        working-directory: apps/worker-api
        run: |
          set -eu
          find ../../packages/db-schema/seed/assets/kisah-dzulqarnain -name "*.pdf" | while read -r f; do
            key="ebooks/kisah-dzulqarnain/$(echo "$f" | sed 's#.*/kisah-dzulqarnain/##')"
            npx wrangler r2 object put "${CLOUDFLARE_R2_BUCKET_NAME}/${key}" --file="$f" --remote --content-type=application/pdf
          done

      - name: Upload seed PDFs (Kisah Ashabul Kahfi) to R2
        working-directory: apps/worker-api
        run: |
          set -eu
          find ../../packages/db-schema/seed/assets/kisah-ashabul-kahfi -name "*.pdf" | while read -r f; do
            key="ebooks/kisah-ashabul-kahfi/$(echo "$f" | sed 's#.*/kisah-ashabul-kahfi/##')"
            npx wrangler r2 object put "${CLOUDFLARE_R2_BUCKET_NAME}/${key}" --file="$f" --remote --content-type=application/pdf
          done

      - name: Upload seed PDFs (Kisah Nabi Nuh) to R2
        working-directory: apps/worker-api
        run: |
          set -eu
          find ../../packages/db-schema/seed/assets/kisah-nuh -name "*.pdf" | while read -r f; do
            key="ebooks/kisah-nuh/$(echo "$f" | sed 's#.*/kisah-nuh/##')"
            npx wrangler r2 object put "${CLOUDFLARE_R2_BUCKET_NAME}/${key}" --file="$f" --remote --content-type=application/pdf
          done

      - name: Clean stale DNS records so Custom Domains can attach
        run: |
          set -eu
          CF="https://api.cloudflare.com/client/v4"
          AUTH="Authorization: Bearer ${CLOUDFLARE_API_TOKEN}"
          ZONE_ID=$(curl -s -H "$AUTH" "$CF/zones?name=ulyah.com" | jq -r '.result[0].id // empty')
          if [ -z "$ZONE_ID" ]; then
            echo "::warning::ulyah.com zone not found on this account (or token lacks Zone:Read) — workers will deploy without custom domains and be reachable on *.workers.dev only."
            exit 0
          fi
          echo "Zone id: $ZONE_ID"
          for host in ulyah.com www.ulyah.com api.ulyah.com; do
            # Only plain A/AAAA/CNAME records block custom-domain attachment
            # (these are typically dead placeholder records from domain setup —
            # the cause of the 522 error). Worker-managed records are untouched.
            resp=$(curl -s -H "$AUTH" "$CF/zones/$ZONE_ID/dns_records?name=$host")
            if [ "$(echo "$resp" | jq -r '.success')" != "true" ]; then
              echo "::warning::Could not list DNS records for $host — token likely lacks Zone>DNS:Edit. Cloudflare said: $(echo "$resp" | jq -c '.errors')"
              continue
            fi
            ids=$(echo "$resp" | jq -r '.result[]? | select(.type=="A" or .type=="AAAA" or .type=="CNAME") | .id')
            for id in $ids; do
              echo "Deleting stale DNS record $id on $host"
              del=$(curl -s -X DELETE -H "$AUTH" "$CF/zones/$ZONE_ID/dns_records/$id")
              if [ "$(echo "$del" | jq -r '.success')" != "true" ]; then
                echo "::warning::Failed to delete DNS record $id on $host: $(echo "$del" | jq -c '.errors')"
              fi
            done
          done

      - name: Deploy worker-api
        working-directory: apps/worker-api
        run: npx wrangler deploy

      - name: Push Worker secrets (auto-generating internal ones if absent)
        working-directory: apps/worker-api
        run: |
          set -eu
          # Internal infrastructure secrets: prefer the GitHub Secret if set;
          # otherwise keep whatever the Worker already has (stability matters —
          # KEY_ENCRYPTION_SECRET decrypts every donated API key at rest);
          # only generate a fresh value the very first time neither exists.
          EXISTING=$(npx wrangler secret list 2>/dev/null | jq -r '.[].name' || true)

          resolve_internal () {
            local name="$1" ghvalue="$2" bytes="$3"
            if [ -n "$ghvalue" ]; then
              echo "$ghvalue"
            elif echo "$EXISTING" | grep -qx "$name"; then
              echo "" # keep the Worker's current value — omit from bulk update
            else
              echo "::notice::$name not provided in GitHub Secrets — auto-generating once and storing it only as a Cloudflare Worker secret." >&2
              openssl rand -base64 "$bytes"
            fi
          }

          KEY_ENC=$(resolve_internal "KEY_ENCRYPTION_SECRET" "${KEY_ENCRYPTION_SECRET}" 32)
          SESS=$(resolve_internal "ADMIN_SESSION_SECRET" "${ADMIN_SESSION_SECRET}" 48)

          # Build the bulk JSON with only non-empty values so we never
          # overwrite an existing Worker secret with an empty string.
          jq -n \
            --arg KEY_ENCRYPTION_SECRET "$KEY_ENC" \
            --arg ADMIN_SESSION_SECRET "$SESS" \
            --arg ADMIN_BOOTSTRAP_EMAIL "$ADMIN_BOOTSTRAP_EMAIL" \
            --arg ADMIN_BOOTSTRAP_PASSWORD "$ADMIN_BOOTSTRAP_PASSWORD" \
            --arg PAYPAL_MODE "$PAYPAL_MODE" \
            --arg PAYPAL_CLIENT_ID_SANDBOX "$PAYPAL_CLIENT_ID_SANDBOX" \
            --arg PAYPAL_CLIENT_SECRET_SANDBOX "$PAYPAL_CLIENT_SECRET_SANDBOX" \
            --arg PAYPAL_CLIENT_ID_LIVE "$PAYPAL_CLIENT_ID_LIVE" \
            --arg PAYPAL_CLIENT_SECRET_LIVE "$PAYPAL_CLIENT_SECRET_LIVE" \
            --arg PAYPAL_WEBHOOK_ID "$PAYPAL_WEBHOOK_ID" \
            --arg NOWPAYMENTS_API_KEY "$NOWPAYMENTS_API_KEY" \
            --arg NOWPAYMENTS_IPN_SECRET "$NOWPAYMENTS_IPN_SECRET" \
            --arg CORS_ALLOW_ORIGIN "$CORS_ALLOW_ORIGIN" \
            '$ARGS.named | with_entries(select(.value != ""))' > /tmp/secrets.json

          echo "Setting $(jq 'length' /tmp/secrets.json) worker secrets: $(jq -r 'keys | join(", ")' /tmp/secrets.json)"
          npx wrangler secret bulk /tmp/secrets.json
          rm -f /tmp/secrets.json
        env:
          KEY_ENCRYPTION_SECRET: ${{ secrets.KEY_ENCRYPTION_SECRET }}
          ADMIN_SESSION_SECRET: ${{ secrets.ADMIN_SESSION_SECRET }}
          ADMIN_BOOTSTRAP_EMAIL: ${{ secrets.ADMIN_BOOTSTRAP_EMAIL }}
          ADMIN_BOOTSTRAP_PASSWORD: ${{ secrets.ADMIN_BOOTSTRAP_PASSWORD }}
          PAYPAL_MODE: ${{ secrets.PAYPAL_MODE }}
          PAYPAL_CLIENT_ID_SANDBOX: ${{ secrets.PAYPAL_CLIENT_ID_SANDBOX }}
          PAYPAL_CLIENT_SECRET_SANDBOX: ${{ secrets.PAYPAL_CLIENT_SECRET_SANDBOX }}
          PAYPAL_CLIENT_ID_LIVE: ${{ secrets.PAYPAL_CLIENT_ID_LIVE }}
          PAYPAL_CLIENT_SECRET_LIVE: ${{ secrets.PAYPAL_CLIENT_SECRET_LIVE }}
          PAYPAL_WEBHOOK_ID: ${{ secrets.PAYPAL_WEBHOOK_ID }}
          NOWPAYMENTS_API_KEY: ${{ secrets.NOWPAYMENTS_API_KEY }}
          NOWPAYMENTS_IPN_SECRET: ${{ secrets.NOWPAYMENTS_IPN_SECRET }}
          CORS_ALLOW_ORIGIN: ${{ secrets.CORS_ALLOW_ORIGIN }}

      - name: Build web (Next.js via OpenNext)
        working-directory: apps/web
        run: npx opennextjs-cloudflare build
        env:
          NEXT_PUBLIC_API_URL: https://api.ulyah.com

      - name: Deploy web
        working-directory: apps/web
        run: npx wrangler deploy

      - name: Attach ulyah.com custom domains to web worker (overrides stale DNS)
        run: |
          set -eu
          CF="https://api.cloudflare.com/client/v4"
          AUTH="Authorization: Bearer ${CLOUDFLARE_API_TOKEN}"
          ZONE_ID=$(curl -s -H "$AUTH" "$CF/zones?name=ulyah.com" | jq -r '.result[0].id // empty')
          if [ -z "$ZONE_ID" ]; then
            echo "::warning::ulyah.com zone not found — site remains on *.workers.dev until the zone is active."
            exit 0
          fi
          blocked=""
          for host in ulyah.com www.ulyah.com; do
            resp=$(curl -s -X PUT -H "$AUTH" -H "Content-Type: application/json" \
              -d "{\"zone_id\":\"$ZONE_ID\",\"hostname\":\"$host\",\"service\":\"ulyah-web\",\"environment\":\"production\"}" \
              "$CF/accounts/${CLOUDFLARE_ACCOUNT_ID}/workers/domains")
            ok=$(echo "$resp" | jq -r '.success')
            code=$(echo "$resp" | jq -r '.errors[0].code // 0')
            echo "$host -> ulyah-web: success=$ok errors=$(echo "$resp" | jq -c '.errors')"
            if [ "$ok" != "true" ]; then
              if [ "$code" = "100117" ]; then
                # Pre-existing externally managed DNS record blocks the attach and
                # this token can't delete DNS records. One-time manual fix needed;
                # after that, this step attaches the domain automatically forever.
                blocked="$blocked $host"
              else
                echo "::error::Failed to attach $host to ulyah-web — see Cloudflare error above."
                exit 1
              fi
            fi
          done
          if [ -n "$blocked" ]; then
            {
              echo "## ⚠️ Action needed to finish connecting:$blocked"
              echo ""
              echo "These hostnames still have old placeholder DNS records (the cause of the 522 error),"
              echo "and the deploy token cannot delete DNS records. Pick ONE of these one-time fixes:"
              echo ""
              echo "1. **Easiest:** Cloudflare dashboard → ulyah.com → DNS → Records → delete the A/AAAA/CNAME record(s) for \`ulyah.com\` and \`www\` → re-run this workflow (or just push again)."
              echo "2. **Best long-term:** edit the CLOUDFLARE_API_TOKEN at dash.cloudflare.com/profile/api-tokens → add **Zone → DNS → Edit** for ulyah.com → re-run. The workflow will then clean up and attach automatically, now and forever."
              echo ""
              echo "api.ulyah.com is unaffected and already live."
            } >> "$GITHUB_STEP_SUMMARY"
            echo "::warning::Could not attach:$blocked — old DNS records must be removed once (see the run summary for the 1-minute fix). api.ulyah.com is live; the site is meanwhile reachable on the workers.dev URL."
          fi

      - name: Smoke test (retries while DNS/cert for the new custom domain settles)
        run: |
          set -eu
          for i in 1 2 3 4 5 6; do
            if curl -sf --max-time 15 "https://api.ulyah.com/health"; then
              echo "" && echo "api.ulyah.com is live ✓"
              exit 0
            fi
            echo "attempt $i failed, retrying in 20s..."
            sleep 20
          done
          echo "::error::api.ulyah.com health check failed after 6 attempts — check the Cloudflare dashboard (Workers > ulyah-api > Settings > Domains) and workflow logs above."
          exit 1
