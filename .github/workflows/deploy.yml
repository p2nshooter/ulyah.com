      - name: Build web for xad.es tenant (Ulyah English)
        working-directory: apps/web
        run: npx opennextjs-cloudflare build
        env:
          NEXT_PUBLIC_API_URL: https://api.ulyah.com
          NEXT_PUBLIC_TENANT: "xad"

      - name: Deploy xad.es web (xad-web worker)
        working-directory: apps/web
        run: npx wrangler deploy --name xad-web

      - name: Attach xad.es custom domains to xad-web
        run: |
          set -eu
          CF="https://api.cloudflare.com/client/v4"
          AUTH="Authorization: Bearer ${CLOUDFLARE_API_TOKEN}"
          ZONE_ID=$(curl -s -H "$AUTH" "$CF/zones?name=xad.es" | jq -r '.result[0].id // empty')
          if [ -z "$ZONE_ID" ]; then
            echo "::warning::xad.es zone not found on this account/token — xad-web stays on workers.dev until the zone is added."
            exit 0
          fi
          for host in xad.es www.xad.es; do
            # override_existing_origin: xad.es was previously bound to the old
            # standalone xad-es tech-article worker. Without this flag Cloudflare
            # refuses to move the hostname (error 100116) and xad.es keeps
            # serving the retired site instead of the new xad-web ecosystem app.
            resp=$(curl -s -X PUT -H "$AUTH" -H "Content-Type: application/json" \
              -d "{\"zone_id\":\"$ZONE_ID\",\"hostname\":\"$host\",\"service\":\"xad-web\",\"environment\":\"production\",\"override_existing_origin\":true}" \
              "$CF/accounts/${CLOUDFLARE_ACCOUNT_ID}/workers/domains")
            echo "$host -> xad-web: success=$(echo "$resp" | jq -r '.success') errors=$(echo "$resp" | jq -c '.errors')"
          done

      - name: Smoke test sibling domains (non-fatal while DNS settles)
        continue-on-error: true
        run: |
          set -eu
          for site in https://1fr.fr https://tilawa.de https://dawa.es https://xad.es; do
            code=$(curl -s -o /dev/null -w "%{http_code}" --max-time 20 -L "$site" || echo "000")
            echo "$site -> HTTP $code"
          done

      - name: Smoke test (retries while DNS/cert for the new custom domain settles)
        run: |
          set -eu
          for i in 1 2 3 4 5 6; do
            if curl -sf --max-time 15 "https://api.ulyah.com/health"; then
              echo "" && echo "api.ulyah.com is live ✓"
              exit 0
            fi
            echo "attempt $i failed, retrying in 20s..."
            sleep 20
          done
          echo "::error::api.ulyah.com health check failed after 6 attempts — check the Cloudflare dashboard (Workers > ulyah-api > Settings > Domains) and workflow logs above."
          exit 1
