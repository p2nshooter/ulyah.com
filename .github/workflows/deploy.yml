          ZONE=$(curl -s -H "$AUTH" "$CF/zones?name=dawa.es")
          ZONE_ID=$(echo "$ZONE" | jq -r '.result[0].id // empty')
          if [ -z "$ZONE_ID" ]; then
            echo "dawa.es zone missing — creating it on this account."
            CREATE=$(curl -s -X POST -H "$AUTH" -H "Content-Type: application/json" \
              -d "{\"name\":\"dawa.es\",\"account\":{\"id\":\"${CLOUDFLARE_ACCOUNT_ID}\"},\"type\":\"full\"}" "$CF/zones")
            if [ "$(echo "$CREATE" | jq -r '.success')" = "true" ]; then
              ZONE_ID=$(echo "$CREATE" | jq -r '.result.id')
              NS=$(echo "$CREATE" | jq -r '.result.name_servers | join(" · ")')
              {
                echo "## 🌐 dawa.es zone created in Cloudflare"
                echo ""
                echo "One manual step remains (only the registrar can do this): set the"
                echo "dawa.es nameservers at your registrar to:"
                echo ""
                echo "**${NS}**"
                echo ""
                echo "Once the delegation is live, every future deploy attaches"
                echo "dawa.es/www.dawa.es to dawa-web automatically."
              } >> "$GITHUB_STEP_SUMMARY"
              echo "::notice::dawa.es zone created — set registrar nameservers to: ${NS}"
            else
              echo "::warning::Could not create dawa.es zone: $(echo "$CREATE" | jq -c '.errors') — token may lack Zone:Edit, or the domain isn't registered yet."
            fi
          else
            STATUS=$(echo "$ZONE" | jq -r '.result[0].status')
            NS=$(echo "$ZONE" | jq -r '.result[0].name_servers | join(" · ")' 2>/dev/null || echo "?")
